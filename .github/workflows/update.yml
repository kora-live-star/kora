name: Auto Update Matches

on:
  schedule:
    - cron: '*/30 * * * *' # سيعمل كل نصف ساعة
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # السماح للروبوت بتعديل الملفات

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper Script
        run: python scrape_matches.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Auto Bot"
          git add matches.json streams.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث المباريات وروابط البث 🚀"
          git push || true
